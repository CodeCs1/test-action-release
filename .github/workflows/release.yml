name: CI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*" # Triggers only on semantic version tags

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Required to create releases and upload assets
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Assets
        run: |
          echo "Build version ${{ github.ref_name }}" > build-artifact.txt
          # Add your actual build commands here (npm run build, go build, etc.)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type =='branch'
        with:
          # Path to files you want to upload to the release
          files: |
            build-artifact.txt
            dist/*.zip
          
          # Automatically generates release notes from commit history
          generate_release_notes: true
          
          # Optional: Mark as a draft or pre-release
          draft: false
          prerelease: false
          
          # Optional: Custom body (overrides auto-generated notes if provided)
          # body: "This is a custom release description."
          
          # The token is handled automatically by the runner
          token: ${{ secrets.GITHUB_TOKEN }}
