name: "Release Creation"

on:
  push:
    tags:
      - "v*.*.*" # Triggers only on semantic version tags like v1.2.3

jobs:
  release:
    runs-on: ubuntu-latest
    permissions: # v3 often requires explicit write permissions for the token
      contents: write
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Useful if you need full history for changelogs

      - name: "Build Assets"
        run: |
          echo "Building my application..."
          echo "Build result" > build-artifact.txt
          echo "Another file" > config.json

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v3
        with:
          # List of files to upload as release assets (newline-delimited)
          files: |
            build-artifact.txt
            config.json
          
          # Automatically generate the release body from commit messages
          generate_release_notes: true
          
          # Optional: Mark as a draft or a prerelease
          draft: false
          prerelease: false
          
          # Optional: Custom body (overrides generate_release_notes if both provided)
          # body: "This is a custom release description."
          
          # The GITHUB_TOKEN is used by default, but you can specify it explicitly
          token: ${{ secrets.GITHUB_TOKEN }}
